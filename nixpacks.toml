[phases.setup]
nixPkgs = ["nodejs_20", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "python3.12 -m pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && python3.12 -m uvicorn main:app --host 0.0.0.0 --port $PORT"
